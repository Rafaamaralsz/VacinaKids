<ion-card class="child-card">
  <ion-card-header>
    <div class="card-header-row">
      <div class="avatar">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <div class="info">
        <ion-card-title>{{ child.nome }}</ion-card-title>
        <p class="age">{{ child.idadeLabel }}</p>
      </div>
    </div>
  </ion-card-header>

  <ion-card-content>
    <app-progress-vaccination
      [percentual]="percentual"
      [aplicadas]="aplicadas"
      [pendentes]="pendentes"
    ></app-progress-vaccination>

    <ion-button expand="block" fill="clear" [routerLink]="['/criancas', child.id]">
      Ver detalhes
      <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
    </ion-button>
  </ion-card-content>
</ion-card>
